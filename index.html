<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALS Automation Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-dark: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #888;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --border-color: #333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .online {
            background: rgba(16, 185, 129, 0.2);
            color: var(--accent-green);
            border: 1px solid var(--accent-green);
        }

        .offline {
            background: rgba(239, 68, 68, 0.2);
            color: var(--accent-red);
            border: 1px solid var(--accent-red);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .panel {
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .panel h2 {
            margin-top: 0;
            font-size: 1.1rem;
            color: var(--accent-blue);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.8;
        }

        .btn-in {
            background-color: var(--accent-green);
            color: white;
        }

        .btn-out {
            background-color: var(--accent-red);
            color: white;
        }

        .log-box {
            height: 200px;
            overflow-y: auto;
            background: #000;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .log-entry {
            margin-bottom: 5px;
            border-bottom: 1px dashed #333;
            padding-bottom: 2px;
        }

        .log-time {
            color: var(--accent-blue);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            margin-top: 10px;
            text-align: center;
        }

        .day {
            padding: 8px 0;
            background: #2a2a2a;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .day:hover {
            background: #3a3a3a;
        }

        .day.skipped {
            background: var(--accent-blue);
            color: white;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>ALS Dashboard 🔄</h1>
            <div id="system-status" class="status-badge offline">System Offline</div>
        </header>

        <div class="grid">
            <div class="panel">
                <h2>Manual Override</h2>
                <p style="font-size: 0.9rem; color: var(--text-muted);">Force the desktop engine to execute a clocking
                    action immediately.</p>
                <div class="button-group">
                    <button class="btn-in" onclick="forceCommand('clock_in')">Force Clock IN</button>
                    <button class="btn-out" onclick="forceCommand('clock_out')">Force Clock OUT</button>
                </div>
            </div>

            <div class="panel">
                <h2>Skip Days Configuration</h2>
                <p style="font-size: 0.9rem; color: var(--text-muted);">Highlighted days will bypass automation.</p>
                <div id="calendar" class="calendar-grid">
                </div>
            </div>
        </div>

        <div class="panel">
            <h2>Live System Logs</h2>
            <div id="log-container" class="log-box">
                <div><span class="log-time">System:</span> Waiting for Supabase connection...</div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. INITIALIZE SUPABASE ---
        const _supabase = supabase.createClient(
            'https://pvutxjfkskzgccawfibu.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2dXR4amZrc2t6Z2NjYXdmaWJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyNTY4OTMsImV4cCI6MjA5NzgzMjg5M30.FtyD9_XkLKUlBFgt5_I1cZZFhxFLRRpi9yAUbCxDJgw' // IMPORTANT: Use the public anon key here, never the service_role key!
        );

        // --- 2. STATE VARIABLES ---
        let lastSeenTimestamp = new Date(0);
        let skippedDates = [];

        // --- 3. HEARTBEAT MONITORING ---
        function updateStatusUI(status, lastSeenStr) {
            lastSeenTimestamp = new Date(lastSeenStr);
            const statusEl = document.getElementById('system-status');

            if (status === 'CAPTIVE_PORTAL') {
                statusEl.className = 'status-badge offline';
                statusEl.textContent = 'Network Blocked (Captive Portal)';
            } else {
                statusEl.className = 'status-badge online';
                statusEl.textContent = 'Desktop Online';
            }
        }

        // Interval to check if desktop died (no heartbeat in 90 seconds)
        setInterval(() => {
            const now = new Date();
            const diffMs = now - lastSeenTimestamp;
            if (diffMs > 90000) {
                const statusEl = document.getElementById('system-status');
                statusEl.className = 'status-badge offline';
                statusEl.textContent = 'Desktop Offline';
            }
        }, 10000);

        // Listen to device_status table changes
        _supabase.channel('device-status')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'device_status' }, payload => {
                updateStatusUI(payload.new.current_status, payload.new.last_seen);
            }).subscribe();

        // Fetch initial status on load
        async function fetchInitialStatus() {
            const { data } = await _supabase.from('device_status').select('*').eq('id', 'home_desktop_agent').single();
            if (data) updateStatusUI(data.current_status, data.last_seen);
        }

        // --- 4. REAL-TIME LOGS ---
        function appendLog(message, createdAt) {
            const logBox = document.getElementById('log-container');
            const time = new Date(createdAt).toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.className = 'log-entry';
            logEntry.innerHTML = `<span class="log-time">[${time}]</span> ${message}`;
            logBox.prepend(logEntry); // Add to top
        }

        // Listen to live logs
        _supabase.channel('live-logs')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'logs' }, payload => {
                appendLog(payload.new.message, payload.new.created_at);
            }).subscribe();

        // Fetch recent logs on load
        async function fetchRecentLogs() {
            const { data } = await _supabase.from('logs').select('*').order('created_at', { ascending: false }).limit(20);
            if (data) data.reverse().forEach(log => appendLog(log.message, log.created_at));
        }

        // --- 5. MANUAL COMMANDS ---
        async function forceCommand(action) {
            if (!confirm(`Are you sure you want to force a ${action.toUpperCase()}?`)) return;

            const { error } = await _supabase.from('commands').insert([{ action: action, status: 'pending' }]);
            if (error) {
                alert("Error sending command: " + error.message);
            } else {
                appendLog(`Remote command '${action}' sent to desktop agent.`, new Date().toISOString());
            }
        }

        // --- 6. SKIP DAYS CALENDAR ---
        async function fetchSkipConfig() {
            const { data } = await _supabase.from('config').select('value').eq('key', 'skip_days').single();
            if (data && data.value) {
                skippedDates = data.value;
            }
            renderCalendar();
        }

        async function toggleSkipDate(dateStr) {
            if (skippedDates.includes(dateStr)) {
                skippedDates = skippedDates.filter(d => d !== dateStr); // Remove
            } else {
                skippedDates.push(dateStr); // Add
            }

            renderCalendar(); // Update UI instantly

            // Push to cloud
            await _supabase.from('config').update({ value: skippedDates }).eq('key', 'skip_days');
            appendLog(`Updated skip days configuration.`, new Date().toISOString());
        }

        function renderCalendar() {
            const cal = document.getElementById('calendar');
            cal.innerHTML = '';

            // Simple upcoming 14-day view for easy clicking
            let today = new Date();
            for (let i = 0; i < 14; i++) {
                let d = new Date(today);
                d.setDate(today.getDate() + i);
                const dateStr = d.toISOString().split('T')[0]; // YYYY-MM-DD
                const displayStr = d.toLocaleDateString('en-US', { weekday: 'short', day: 'numeric' });

                const dayEl = document.createElement('div');
                dayEl.className = 'day' + (skippedDates.includes(dateStr) ? ' skipped' : '');
                dayEl.textContent = displayStr;
                dayEl.onclick = () => toggleSkipDate(dateStr);

                cal.appendChild(dayEl);
            }
        }

        // --- INITIALIZATION ---
        fetchInitialStatus();
        fetchRecentLogs();
        fetchSkipConfig();

    </script>
</body>

</html>
