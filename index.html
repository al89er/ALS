<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALS Dashboard</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Supabase v2 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --border-color: #333333;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --status-online: #10b981;
            --status-offline: #ef4444;
            --font-family: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-family);
            background-image: radial-gradient(circle at top, #1a1a24 0%, var(--bg-color) 70%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 1200px;
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, #fff, #a0a0a0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--status-offline);
            box-shadow: 0 0 8px var(--status-offline);
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }

        .status-online .status-dot {
            background-color: var(--status-online);
            box-shadow: 0 0 8px var(--status-online);
        }

        main {
            width: 100%;
            max-width: 1200px;
            padding: 0 2rem 2rem 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .panel {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .panel h2 {
            font-size: 1.125rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 0.5rem;
        }

        /* Buttons */
        .commands-panel {
            grid-column: 1 / -1;
            flex-direction: row;
            justify-content: center;
            gap: 2rem;
        }

        .btn {
            padding: 1rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: #fff;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            flex: 1;
            max-width: 300px;
        }

        .btn-in {
            background: linear-gradient(135deg, var(--accent-blue), #2563eb);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .btn-out {
            background: linear-gradient(135deg, var(--accent-purple), #7c3aed);
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .btn:active {
            transform: translateY(1px);
        }

        /* Calendar */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.5rem;
        }

        .calendar-tile {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.875rem;
        }

        .calendar-tile:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .calendar-tile.active {
            background-color: rgba(239, 68, 68, 0.2);
            border-color: var(--status-offline);
            color: #fff;
            box-shadow: inset 0 0 10px rgba(239, 68, 68, 0.1);
        }

        .calendar-tile .day-name {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-bottom: 2px;
        }

        /* Logs */
        .logs-panel {
            height: 400px;
        }

        .logs-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            padding-right: 0.5rem;
        }

        .logs-container::-webkit-scrollbar {
            width: 6px;
        }

        .logs-container::-webkit-scrollbar-thumb {
            background-color: var(--border-color);
            border-radius: 3px;
        }

        .log-entry {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            padding: 0.75rem;
            border-radius: 6px;
            font-size: 0.85rem;
            animation: fadeIn 0.3s ease;
        }

        .log-time {
            color: var(--text-secondary);
            font-size: 0.75rem;
            margin-bottom: 4px;
            display: block;
        }

        .log-status-success {
            color: var(--status-online);
        }

        .log-status-failed {
            color: var(--status-offline);
        }

        .log-status-pending {
            color: #f59e0b;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            main {
                grid-template-columns: 1fr;
            }

            .commands-panel {
                flex-direction: column;
                align-items: center;
            }

            .btn {
                width: 100%;
                max-width: 100%;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>ALS Dashboard</h1>
        <div class="status-badge" id="statusBadge">
            <div class="status-dot"></div>
            <span id="statusText">Offline</span>
        </div>
    </header>

    <main>
        <section class="panel commands-panel">
            <button class="btn btn-in" onclick="forceCommand('clock_in')">Force Clock IN</button>
            <button class="btn btn-out" onclick="forceCommand('clock_out')">Force Clock OUT</button>
        </section>

        <section class="panel calendar-panel">
            <h2>Skip Days Config</h2>
            <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem;">
                Select dates to skip automation for the next 14 days.
            </p>
            <div class="calendar-grid" id="calendarGrid">
                <!-- JS generated tiles -->
            </div>
        </section>

        <section class="panel logs-panel">
            <h2>Live System Logs</h2>
            <div class="logs-container" id="logsContainer">
                <div style="color: var(--text-secondary); font-size: 0.85rem; text-align: center; margin-top: 2rem;">
                    Connecting to Supabase...</div>
            </div>
        </section>
    </main>

    <script>
        // ==========================================
        // CONFIGURATION: Replace these with your keys
        // ==========================================
        const SUPABASE_URL = 'https://pvutxjfkskzgccawfibu.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2dXR4amZrc2t6Z2NjYXdmaWJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyNTY4OTMsImV4cCI6MjA5NzgzMjg5M30.FtyD9_XkLKUlBFgt5_I1cZZFhxFLRRpi9yAUbCxDJgw';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let lastSeenTimestamp = 0;
        let skipDaysArray = [];

        // DOM Elements
        const statusBadge = document.getElementById('statusBadge');
        const statusText = document.getElementById('statusText');
        const logsContainer = document.getElementById('logsContainer');
        const calendarGrid = document.getElementById('calendarGrid');

        // ==========================================
        // 1. HEARTBEAT ENGINE
        // ==========================================
        async function fetchInitialStatus() {
            const { data, error } = await supabase
                .from('device_status')
                .select('*')
                .eq('id', 'home_desktop_agent')
                .single();

            if (data) updateHeartbeat(data.last_seen, data.current_status);
        }

        function updateHeartbeat(timestamp, statusStr) {
            lastSeenTimestamp = new Date(timestamp).getTime();
            evaluateStatus(statusStr);
        }

        function evaluateStatus(overrideStatus = null) {
            const now = Date.now();
            const diff = now - lastSeenTimestamp;
            const isOnline = diff < 90000; // 90 seconds

            if (overrideStatus === 'CAPTIVE_PORTAL') {
                statusBadge.className = 'status-badge';
                statusText.innerText = 'Captive Portal';
            } else if (isOnline) {
                statusBadge.className = 'status-badge status-online';
                statusText.innerText = 'Online';
            } else {
                statusBadge.className = 'status-badge';
                statusText.innerText = 'Offline';
            }
        }

        // Failsafe loop every 5s
        setInterval(() => evaluateStatus(), 5000);

        // Subscribe to Heartbeat
        supabase.channel('heartbeat-channel')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'device_status', filter: "id=eq.home_desktop_agent" }, payload => {
                updateHeartbeat(payload.new.last_seen, payload.new.current_status);
            })
            .subscribe();

        // ==========================================
        // 2. LIVE LOGS
        // ==========================================
        function createLogElement(log) {
            const div = document.createElement('div');
            div.className = 'log-entry';
            const dateStr = new Date(log.created_at).toLocaleString();
            let statusClass = 'log-status-pending';
            if (log.status === 'success' || log.status === 'completed') statusClass = 'log-status-success';
            if (log.status === 'error' || log.status === 'failed') statusClass = 'log-status-failed';

            div.innerHTML = `
                <span class="log-time">${dateStr}</span>
                <strong>[${log.action ? log.action.toUpperCase() : 'SYS'}]</strong> 
                <span class="${statusClass}">${log.status || ''}</span>
                <div style="margin-top: 4px; color: #ccc;">${log.message || ''}</div>
            `;
            return div;
        }

        async function fetchLogs() {
            const { data, error } = await supabase
                .from('logs')
                .select('*')
                .order('created_at', { ascending: false })
                .limit(20);

            if (data) {
                logsContainer.innerHTML = '';
                data.forEach(log => logsContainer.appendChild(createLogElement(log)));
            }
        }

        supabase.channel('logs-channel')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'logs' }, payload => {
                // Remove placeholder text if it's the first log
                if (logsContainer.children[0] && logsContainer.children[0].innerText.includes('Connecting')) {
                    logsContainer.innerHTML = '';
                }
                const el = createLogElement(payload.new);
                logsContainer.insertBefore(el, logsContainer.firstChild);
            })
            .subscribe();

        // ==========================================
        // 3. MANUAL COMMANDS
        // ==========================================
        async function forceCommand(actionType) {
            const { error } = await supabase
                .from('commands')
                .insert([{ action: actionType, status: 'pending' }]);

            if (error) alert('Failed to send command: ' + error.message);
            else alert('Command ' + actionType + ' sent successfully!');
        }

        // ==========================================
        // 4. SKIP DAYS CALENDAR
        // ==========================================
        async function fetchConfig() {
            const { data, error } = await supabase
                .from('config')
                .select('*')
                .eq('key', 'skip_days')
                .single();

            if (data && data.value) {
                skipDaysArray = Array.isArray(data.value) ? data.value : [];
            }
            renderCalendar();
        }

        function renderCalendar() {
            calendarGrid.innerHTML = '';
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const daysOfWeek = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

            for (let i = 0; i < 14; i++) {
                const d = new Date(today);
                d.setDate(today.getDate() + i);
                const dateString = d.toISOString().split('T')[0]; // YYYY-MM-DD

                const tile = document.createElement('div');
                tile.className = 'calendar-tile' + (skipDaysArray.includes(dateString) ? ' active' : '');
                tile.onclick = () => toggleDate(dateString);

                tile.innerHTML = `
                    <span class="day-name">${daysOfWeek[d.getDay()]}</span>
                    <strong>${d.getDate()}</strong>
                `;
                calendarGrid.appendChild(tile);
            }
        }

        async function toggleDate(dateString) {
            if (skipDaysArray.includes(dateString)) {
                skipDaysArray = skipDaysArray.filter(d => d !== dateString);
            } else {
                skipDaysArray.push(dateString);
            }
            renderCalendar(); // Optimistic update

            const { error } = await supabase
                .from('config')
                .upsert({ key: 'skip_days', value: skipDaysArray });

            if (error) {
                console.error("Failed to update config", error);
                alert("Failed to save skip day");
            }
        }

        // Initialize App
        fetchInitialStatus();
        fetchLogs();
        fetchConfig();

    </script>
</body>

</html>
